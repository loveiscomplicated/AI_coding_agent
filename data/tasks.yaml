tasks:
- id: task-001
  title: 도메인 모델 정의 — 좌표, 장소, 경로
  description: 앱 전체에서 공통으로 사용하는 핵심 도메인 모델을 정의한다. Coordinate(위도/경도), Place(장소명, 좌표,
    POI ID), Route(출발지, 목적지, 경로 좌표 리스트, 총 거리)를 data class로 구현한다.
  acceptance_criteria:
  - Coordinate는 latitude(Double), longitude(Double) 필드를 가지며 유효 범위(-90~90, -180~180)
    벗어날 경우 IllegalArgumentException을 던진다
  - Place는 name(String), coordinate(Coordinate), poiId(String) 필드를 가진다
  - Route는 origin(Place), destination(Place), waypoints(List<Coordinate>), totalDistanceMeters(Double)
    필드를 가지며 waypoints가 비어있으면 안 된다
  - 모든 모델은 equals/hashCode/copy가 올바르게 동작한다(data class 기본 구현 검증)
  target_files:
  - app/src/main/java/com/example/arnavigation/domain/model/Coordinate.kt
  - app/src/main/java/com/example/arnavigation/domain/model/Place.kt
  - app/src/main/java/com/example/arnavigation/domain/model/Route.kt
  test_framework: pytest
  depends_on: []
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-002
  title: 도메인 모델 단위 테스트
  description: task-001에서 정의한 Coordinate, Place, Route 모델의 유효성 검증 로직과 동등성 비교를 단위 테스트로
    검증한다.
  acceptance_criteria:
  - Coordinate 유효 범위 초과 시 IllegalArgumentException 발생을 테스트가 확인한다
  - 동일한 값의 Coordinate 두 인스턴스가 equals로 같다고 판정된다
  - Route 생성 시 waypoints가 빈 리스트이면 예외가 발생하는 것을 테스트가 확인한다
  - Route.copy()로 destination만 변경한 새 인스턴스가 원본과 다른 객체임을 확인한다
  target_files:
  - app/src/test/java/com/example/arnavigation/domain/model/CoordinateTest.kt
  - app/src/test/java/com/example/arnavigation/domain/model/PlaceTest.kt
  - app/src/test/java/com/example/arnavigation/domain/model/RouteTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-003
  title: MapService 인터페이스 및 결과 래퍼 정의
  description: '어댑터 패턴의 핵심인 MapService 인터페이스를 정의한다. searchPlace(query: String): Result<List<Place>>,
    getWalkingRoute(origin: Coordinate, destination: Coordinate): Result<Route>, distanceToRoute(current:
    Coordinate, route: Route): Double 세 가지 메서드를 포함한다. Result는 sealed class(Success,
    Failure)로 정의한다.'
  acceptance_criteria:
  - MapService는 interface로 선언되며 searchPlace, getWalkingRoute, distanceToRoute 세 메서드
    시그니처를 포함한다
  - 'MapResult sealed class는 MapResult.Success<T>(data: T)와 MapResult.Failure(error:
    Throwable) 두 서브클래스를 가진다'
  - distanceToRoute는 suspend 함수가 아닌 순수 함수(pure function)로 선언된다
  - searchPlace와 getWalkingRoute는 suspend 함수로 선언된다
  target_files:
  - app/src/main/java/com/example/arnavigation/domain/service/MapService.kt
  - app/src/main/java/com/example/arnavigation/domain/service/MapResult.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-004
  title: 경로 이탈 감지 로직 — RouteDeviationDetector
  description: 현재 GPS 좌표와 Route의 waypoints 간 최소 거리를 계산하여 이탈 여부를 판정하는 RouteDeviationDetector를
    구현한다. 이탈 임계값(deviationThresholdMeters)은 외부에서 주입 가능한 설정값으로 처리한다. 두 좌표 간 거리는 Haversine
    공식을 사용한다.
  acceptance_criteria:
  - 'RouteDeviationDetector는 생성자에서 deviationThresholdMeters: Double을 인자로 받는다'
  - 'isDeviated(current: Coordinate, route: Route): Boolean 메서드가 경로의 모든 waypoint 세그먼트
    중 최소 거리가 임계값을 초과하면 true를 반환한다'
  - Haversine 공식 기반 거리 계산 결과가 알려진 두 좌표(서울시청-광화문 약 600m) 기준으로 ±10m 오차 내에서 정확하다
  - deviationThresholdMeters를 50.0으로 설정했을 때 경로에서 60m 벗어난 좌표는 isDeviated=true, 40m
    벗어난 좌표는 false를 반환한다
  target_files:
  - app/src/main/java/com/example/arnavigation/domain/navigation/RouteDeviationDetector.kt
  - app/src/test/java/com/example/arnavigation/domain/navigation/RouteDeviationDetectorTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-005
  title: NavigationConfig — 앱 설정값 외부화
  description: 경로 이탈 임계값 등 튜닝 가능한 설정값을 한 곳에서 관리하는 NavigationConfig data class를 정의한다.
    기본값을 제공하되 외부에서 오버라이드 가능하도록 설계한다.
  acceptance_criteria:
  - 'NavigationConfig는 deviationThresholdMeters: Double = 40.0을 기본값으로 가진다'
  - NavigationConfig 인스턴스를 copy()로 deviationThresholdMeters만 변경하여 생성할 수 있다
  - RouteDeviationDetector가 NavigationConfig를 인자로 받아 내부 임계값으로 사용하도록 연동된다
  - 단위 테스트에서 기본 NavigationConfig와 커스텀 값(100.0m) NavigationConfig로 각각 Detector를 생성하면
    다른 이탈 판정 결과가 나온다
  target_files:
  - app/src/main/java/com/example/arnavigation/domain/navigation/NavigationConfig.kt
  - app/src/test/java/com/example/arnavigation/domain/navigation/NavigationConfigTest.kt
  test_framework: pytest
  depends_on:
  - task-004
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-006
  title: FakeMapService — 테스트용 MapService 구현체
  description: 단위 테스트 및 UI 개발용 FakeMapService를 구현한다. 미리 정의된 더미 데이터를 반환하며 네트워크 없이 동작한다.
    searchPlace는 쿼리 키워드가 포함된 더미 Place 리스트를 반환하고, getWalkingRoute는 직선 경로(출발지-목적지 2점)
    Route를 반환한다.
  acceptance_criteria:
  - FakeMapService는 MapService 인터페이스를 구현한다
  - searchPlace('경복궁') 호출 시 MapResult.Success를 반환하고 결과 리스트에 '경복궁'이 포함된 Place가 존재한다
  - getWalkingRoute 호출 시 waypoints가 출발지 좌표와 목적지 좌표 2개 이상인 Route를 포함한 MapResult.Success를
    반환한다
  - distanceToRoute는 current 좌표와 route의 첫 번째 waypoint 간 Haversine 거리를 반환한다
  - FakeMapService를 사용한 통합 테스트에서 searchPlace → getWalkingRoute → distanceToRoute 순서로
    호출 시 예외 없이 동작한다
  target_files:
  - app/src/test/java/com/example/arnavigation/data/fake/FakeMapService.kt
  - app/src/test/java/com/example/arnavigation/data/fake/FakeMapServiceTest.kt
  test_framework: pytest
  depends_on:
  - task-003
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-007
  title: 카카오맵 어댑터 — KakaoMapService 구현
  description: MapService 인터페이스를 구현하는 KakaoMapService를 작성한다. 카카오 REST API(로컬 키워드 검색,
    길찾기)를 Retrofit으로 호출한다. API 응답 DTO를 도메인 모델(Place, Route)로 변환하는 매퍼를 포함한다.
  acceptance_criteria:
  - KakaoMapService는 MapService 인터페이스를 구현한다
  - searchPlace 호출 시 카카오 로컬 키워드 검색 API(/v2/local/search/keyword.json) 엔드포인트로 요청한다
  - getWalkingRoute 호출 시 카카오 길찾기 API 엔드포인트로 요청하고 응답의 경로 좌표를 Route.waypoints에 매핑한다
  - API 호출 실패(HTTP 4xx/5xx) 시 MapResult.Failure(error)를 반환한다
  - KakaoPlaceDto → Place 변환 시 place_name이 Place.name에, x/y 좌표가 Coordinate에 올바르게 매핑된다
  target_files:
  - app/src/main/java/com/example/arnavigation/data/kakao/KakaoMapService.kt
  - app/src/main/java/com/example/arnavigation/data/kakao/KakaoApiDto.kt
  - app/src/main/java/com/example/arnavigation/data/kakao/KakaoResponseMapper.kt
  test_framework: pytest
  depends_on:
  - task-003
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-008
  title: 카카오맵 어댑터 단위 테스트
  description: KakaoResponseMapper의 DTO → 도메인 모델 변환 로직을 단위 테스트로 검증한다. 실제 네트워크 호출 없이
    목(mock) 응답 JSON을 기반으로 테스트한다.
  acceptance_criteria:
  - KakaoPlaceDto 샘플 데이터가 Place로 올바르게 변환되는지 확인한다(place_name, x, y 필드 매핑)
  - 카카오 경로 응답 DTO의 sections[0].roads의 vertexes 배열이 Route.waypoints List<Coordinate>로
    올바르게 변환된다
  - 응답에 장소 결과가 0개인 경우 빈 List<Place>가 반환된다
  - x/y 좌표가 문자열로 오는 경우 Double로 올바르게 파싱된다
  target_files:
  - app/src/test/java/com/example/arnavigation/data/kakao/KakaoResponseMapperTest.kt
  test_framework: pytest
  depends_on:
  - task-007
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-009
  title: NavigationViewModel — 내비게이션 상태 관리
  description: 내비게이션 핵심 흐름을 관리하는 NavigationViewModel을 구현한다. 목적지 설정, 경로 조회, 현재 위치 업데이트,
    이탈 감지 상태를 StateFlow로 노출한다. MapService와 RouteDeviationDetector를 의존성으로 주입받는다.
  acceptance_criteria:
  - 'NavigationViewModel은 uiState: StateFlow<NavigationUiState>를 노출하며 초기 상태는 Idle이다'
  - 'setDestination(place: Place) 호출 시 MapService.getWalkingRoute를 호출하고 성공 시 상태가 Navigating으로
    전환된다'
  - 'updateCurrentLocation(coordinate: Coordinate) 호출 시 RouteDeviationDetector.isDeviated를
    평가하여 이탈이면 상태에 isDeviated=true가 반영된다'
  - getWalkingRoute 실패 시 NavigationUiState.Error 상태로 전환된다
  - 테스트에서 FakeMapService를 주입하여 네트워크 없이 ViewModel 동작 전체를 검증할 수 있다
  target_files:
  - app/src/main/java/com/example/arnavigation/ui/navigation/NavigationViewModel.kt
  - app/src/main/java/com/example/arnavigation/ui/navigation/NavigationUiState.kt
  test_framework: pytest
  depends_on:
  - task-003
  - task-005
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-010
  title: NavigationViewModel 단위 테스트
  description: FakeMapService를 사용하여 NavigationViewModel의 상태 전이 시나리오를 단위 테스트로 검증한다.
  acceptance_criteria:
  - 초기 상태가 NavigationUiState.Idle임을 확인한다
  - setDestination 성공 시 상태가 NavigationUiState.Navigating으로 전환됨을 TestCoroutineScope에서
    확인한다
  - updateCurrentLocation으로 이탈 좌표 입력 시 uiState의 isDeviated가 true로 변경된다
  - FakeMapService가 Failure를 반환하도록 설정 후 setDestination 호출 시 NavigationUiState.Error
    상태가 된다
  target_files:
  - app/src/test/java/com/example/arnavigation/ui/navigation/NavigationViewModelTest.kt
  test_framework: pytest
  depends_on:
  - task-006
  - task-009
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-011
  title: AR 방향 계산 유틸리티 — ArDirectionCalculator
  description: '현재 기기 방위각(방향)과 목표 지점 방향을 비교하여 AR 화면에 화살표를 그리기 위한 상대 각도를 계산하는 순수 함수
    유틸리티를 구현한다. 입력: 현재 좌표, 다음 waypoint 좌표, 기기 방위각(degrees). 출력: 화면 기준 상대 회전각(degrees,
    -180~180).'
  acceptance_criteria:
  - 'calculateBearing(from: Coordinate, to: Coordinate): Double 함수가 정북(0°) 방향으로 이동
    시 0.0을 반환한다'
  - calculateBearing이 서울시청에서 동쪽 1km 지점을 향할 때 약 90도(±2도 오차)를 반환한다
  - 'getRelativeAngle(bearing: Double, deviceAzimuth: Double): Double 함수가 목표 방위 90°,
    기기 방위 45°일 때 +45.0을 반환한다'
  - getRelativeAngle의 반환값은 항상 -180.0 이상 180.0 이하 범위로 정규화된다
  target_files:
  - app/src/main/java/com/example/arnavigation/ar/ArDirectionCalculator.kt
  - app/src/test/java/com/example/arnavigation/ar/ArDirectionCalculatorTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-012
  title: AR 오버레이 View — ArrowOverlayView
  description: 'ARCore 세션 위에 Canvas로 큰 화살표를 그리는 커스텀 View(ArrowOverlayView)를 구현한다.
    입력: 상대 회전각(relativeAngle: Float). Canvas에 화살표를 그리고 relativeAngle에 따라 회전 적용. ARCore
    SceneView가 아닌 일반 View 위에 오버레이로 동작한다.'
  acceptance_criteria:
  - 'ArrowOverlayView는 View를 상속하며 setDirection(relativeAngle: Float) 메서드를 가진다'
  - setDirection 호출 시 invalidate()를 호출하여 화면이 갱신된다
  - onDraw에서 Paint를 사용해 화살표 Path를 그리고, relativeAngle만큼 회전 행렬(Matrix.setRotate)을 적용한다
  - relativeAngle=0f일 때 화살표가 View 정중앙에서 위쪽(정방향)을 가리키도록 그려진다
  target_files:
  - app/src/main/java/com/example/arnavigation/ar/ArrowOverlayView.kt
  - app/src/main/res/layout/view_ar_overlay.xml
  test_framework: pytest
  depends_on:
  - task-011
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-013
  title: AR 모드 Fragment — ArNavigationFragment
  description: ARCore CameraStream 위에 ArrowOverlayView를 올린 AR 모드 화면 Fragment를 구현한다.
    ARCore 세션 초기화, 카메라 권한 확인, 기기 방위각 센서 구독, ArDirectionCalculator로 화살표 각도 계산 후 ArrowOverlayView에
    전달하는 흐름을 담는다.
  acceptance_criteria:
  - Fragment 진입 시 ARCore 지원 여부를 ArCoreApk.checkAvailability로 확인하고 미지원 기기는 Toast 메시지를
    표시한 뒤 Fragment를 종료한다
  - 카메라 권한이 없을 경우 권한 요청 다이얼로그를 표시한다
  - SensorManager에서 TYPE_ROTATION_VECTOR 센서를 구독하여 방위각을 실시간으로 ArrowOverlayView에 반영한다
  - NavigationViewModel.uiState에서 현재 경로의 다음 waypoint를 읽어 ArDirectionCalculator.calculateBearing으로
    목표 방위각을 계산하고 ArrowOverlayView.setDirection을 호출한다
  target_files:
  - app/src/main/java/com/example/arnavigation/ui/ar/ArNavigationFragment.kt
  - app/src/main/res/layout/fragment_ar_navigation.xml
  test_framework: pytest
  depends_on:
  - task-009
  - task-012
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-014
  title: 일반 안내 모드 Fragment — NavigationFragment
  description: '경로 안내 중 기본 화면인 NavigationFragment를 구현한다. 큰 글씨로 다음 행동 지시(예: ''200m
    앞에서 우회전'')와 남은 거리를 표시하고, ''AR로 보기'' 버튼과 이탈 감지 알림 UI를 포함한다. NavigationViewModel의
    uiState를 구독한다.'
  acceptance_criteria:
  - NavigationViewModel.uiState가 Navigating일 때 다음 waypoint까지의 거리를 큰 글씨(텍스트 크기 24sp
    이상)로 표시한다
  - isDeviated=true 상태가 되면 진동(Vibrator) API를 호출하고 '경로에서 벗어났어요' 텍스트를 화면에 표시한다
  - '''AR로 보기'' 버튼 클릭 시 ArNavigationFragment로 이동(navigate)한다'
  - uiState가 Error일 때 에러 메시지를 표시하고 '다시 시도' 버튼을 노출한다
  target_files:
  - app/src/main/java/com/example/arnavigation/ui/navigation/NavigationFragment.kt
  - app/src/main/res/layout/fragment_navigation.xml
  test_framework: pytest
  depends_on:
  - task-009
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-015
  title: 목적지 설정 화면 — DestinationFragment
  description: 앱 시작 시 표시되는 목적지 설정 화면을 구현한다. 음성 입력 버튼, 즐겨찾기 큰 버튼 목록, 링크 수신 처리(Intent
