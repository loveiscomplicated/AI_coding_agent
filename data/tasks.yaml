tasks:
- id: task-001
  title: MapService 인터페이스 및 도메인 모델 정의
  description: 지도/경로 관련 비즈니스 로직이 의존하는 공통 인터페이스(MapService)와 도메인 데이터 모델(Coordinate,
    Route, Place, RouteStep 등)을 정의한다. 모든 어댑터와 상위 레이어가 이 인터페이스를 통해 통신하도록 계약을 확립한다.
  acceptance_criteria:
  - 'MapService 인터페이스에 searchPlace(query: String): List<Place>, getWalkingRoute(origin:
    Coordinate, destination: Coordinate): Route, distanceToRoute(position: Coordinate,
    route: Route): Double 메서드가 선언되어 있다'
  - 'Coordinate(lat: Double, lng: Double), Place(id: String, name: String, coordinate:
    Coordinate), Route(steps: List<RouteStep>, polyline: List<Coordinate>), RouteStep(instruction:
    String, distance: Double, coordinate: Coordinate) 데이터 클래스가 정의되어 있다'
  - MapService를 구현하는 FakeMapService(테스트용 스텁)를 작성하고, pytest(또는 JUnit) 기반 테스트에서 searchPlace('불국사')가
    비어 있지 않은 Place 리스트를 반환함을 검증한다
  - Route 객체가 steps 리스트와 polyline 리스트를 모두 포함하며, 빈 Route(steps=[], polyline=[])도 유효한
    객체로 생성 가능하다
  - 모든 도메인 모델이 null 불허(non-nullable) 필드로 구성되어 있어 런타임 NPE 위험이 없음을 컴파일 타임에 보장한다
  target_files:
  - app/src/main/java/com/arnavigation/domain/model/Coordinate.kt
  - app/src/main/java/com/arnavigation/domain/model/Place.kt
  - app/src/main/java/com/arnavigation/domain/model/Route.kt
  - app/src/main/java/com/arnavigation/domain/model/RouteStep.kt
  - app/src/main/java/com/arnavigation/domain/service/MapService.kt
  - app/src/test/java/com/arnavigation/domain/service/FakeMapService.kt
  - app/src/test/java/com/arnavigation/domain/service/MapServiceContractTest.kt
  test_framework: pytest
  depends_on: []
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-002
  title: 카카오맵 API 어댑터 구현
  description: MapService 인터페이스를 구현하는 KakaoMapAdapter를 작성한다. 카카오 REST API를 호출하여 장소
    검색, 도보 경로 탐색, 경로까지의 거리 계산 기능을 제공한다. API 키는 BuildConfig를 통해 주입받는다.
  acceptance_criteria:
  - KakaoMapAdapter가 MapService 인터페이스를 구현하며, 컴파일 타임에 모든 메서드가 오버라이드 되어 있다
  - searchPlace()가 카카오 키워드 검색 API(https://dapi.kakao.com/v2/local/search/keyword)를
    호출하고, 응답 JSON의 documents 배열을 List<Place>로 변환하여 반환한다
  - getWalkingRoute()가 카카오 모빌리티 도보 경로 API를 호출하고, 응답의 경로 구간 정보를 Route(steps, polyline)
    객체로 변환하여 반환한다
  - distanceToRoute()가 현재 Coordinate와 Route의 polyline 상의 모든 점 사이 최소 거리를 미터 단위 Double로
    반환하며, 단위 테스트에서 알려진 좌표 쌍에 대해 오차 5m 이내임을 검증한다
  - API 호출 실패(네트워크 오류, 401, 429 등) 시 IOException 또는 커스텀 MapServiceException을 throw하며,
    테스트에서 MockWebServer를 이용해 에러 응답 시나리오를 검증한다
  target_files:
  - app/src/main/java/com/arnavigation/data/adapter/KakaoMapAdapter.kt
  - app/src/main/java/com/arnavigation/data/adapter/KakaoApiModels.kt
  - app/src/main/java/com/arnavigation/domain/exception/MapServiceException.kt
  - app/src/test/java/com/arnavigation/data/adapter/KakaoMapAdapterTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-003
  title: 경로 이탈 감지 모듈
  description: 현재 GPS 위치가 설정된 경로에서 일정 거리 이상 벗어났는지 판단하는 RouteDeviationDetector를 구현한다.
    이탈 임계값은 외부 설정(config)으로 주입받아 코드 변경 없이 조절 가능하도록 설계한다.
  acceptance_criteria:
  - 'RouteDeviationDetector가 생성 시 deviationThresholdMeters: Double 파라미터를 주입받으며, 기본값은
    40.0이다'
  - 'isDeviated(currentPosition: Coordinate, route: Route): Boolean 메서드가 현재 위치와 경로
    간 최소 거리가 임계값 이상이면 true, 미만이면 false를 반환한다'
  - 단위 테스트에서 경로 위에 있는 좌표(거리=0m)에 대해 isDeviated가 false를 반환하고, 경로에서 100m 떨어진 좌표에 대해
    임계값 40m 설정 시 true를 반환함을 검증한다
  - 임계값을 30.0, 40.0, 50.0으로 각각 설정한 세 가지 파라미터화 테스트가 각 임계값 경계값에서 정확히 동작함을 검증한다
  - 'DeviaionConfig 데이터 클래스(deviationThresholdMeters: Double)가 별도 파일로 존재하며, 런타임에 외부에서
    값을 변경하여 RouteDeviationDetector에 재주입할 수 있는 구조임을 확인하는 테스트가 통과한다'
  target_files:
  - app/src/main/java/com/arnavigation/domain/navigation/DeviationConfig.kt
  - app/src/main/java/com/arnavigation/domain/navigation/RouteDeviationDetector.kt
  - app/src/test/java/com/arnavigation/domain/navigation/RouteDeviationDetectorTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-004
  title: 경로 안내 상태 머신 및 NavigationManager
  description: 일반 안내 모드, 사용자 주도 AR 모드, 시스템 이탈 감지 AR 모드 간의 상태 전환을 관리하는 NavigationManager를
    구현한다. GPS 위치 업데이트를 받아 이탈 감지를 수행하고, 상태 변화를 옵저버에게 전달한다.
  acceptance_criteria:
  - NavigationState가 NORMAL_GUIDANCE, USER_AR_MODE, DEVIATION_AR_MODE, ARRIVED 네 가지
    sealed class/enum으로 정의되어 있다
  - NavigationManager.activateUserAR()를 호출하면 상태가 USER_AR_MODE로 전환되고, deactivateAR()를
    호출하면 NORMAL_GUIDANCE로 복귀함을 단위 테스트에서 검증한다
  - NavigationManager.updatePosition(coordinate)를 호출했을 때 RouteDeviationDetector가 이탈을
    감지하면 상태가 DEVIATION_AR_MODE로 자동 전환됨을 단위 테스트에서 검증한다
  - 현재 위치가 목적지로부터 10m 이내에 들어오면 상태가 ARRIVED로 전환됨을 단위 테스트에서 검증한다
  - 'NavigationStateListener 인터페이스(onStateChanged(state: NavigationState))를 등록한 옵저버가
    상태 전환 시마다 정확히 한 번 호출됨을 Mockito 또는 수동 스텁을 이용한 테스트에서 검증한다'
  target_files:
  - app/src/main/java/com/arnavigation/domain/navigation/NavigationState.kt
  - app/src/main/java/com/arnavigation/domain/navigation/NavigationStateListener.kt
  - app/src/main/java/com/arnavigation/domain/navigation/NavigationManager.kt
  - app/src/test/java/com/arnavigation/domain/navigation/NavigationManagerTest.kt
  test_framework: pytest
  depends_on:
  - task-003
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-005
  title: 목적지 설정 — 장소 검색 UseCase
  description: 음성 입력 또는 텍스트로 변환된 목적지 문자열을 받아 장소를 검색하고 사용자가 선택한 목적지를 확정하는 SearchDestinationUseCase를
    구현한다. 즐겨찾기 저장/조회 기능도 포함한다.
  acceptance_criteria:
  - 'SearchDestinationUseCase.search(query: String): List<Place>가 MapService.searchPlace()를
    호출하여 결과를 반환하며, 빈 문자열 입력 시 IllegalArgumentException을 throw한다'
  - 'FavoriteRepository 인터페이스(save(place: Place), getAll(): List<Place>)와 인메모리 구현체
    InMemoryFavoriteRepository가 존재하며, save 후 getAll()에서 해당 Place가 포함되어 있음을 테스트에서 검증한다'
  - SearchDestinationUseCase.search() 결과가 비어 있을 때(검색 결과 없음) 빈 리스트를 반환하고 예외를 throw하지
    않음을 테스트에서 검증한다
  - InMemoryFavoriteRepository에 동일한 Place를 두 번 저장해도 중복 없이 하나만 저장됨을 테스트에서 검증한다
  - SearchDestinationUseCase가 FakeMapService를 주입받아 네트워크 없이 단위 테스트가 통과한다
  target_files:
  - app/src/main/java/com/arnavigation/domain/usecase/SearchDestinationUseCase.kt
  - app/src/main/java/com/arnavigation/domain/repository/FavoriteRepository.kt
  - app/src/main/java/com/arnavigation/data/repository/InMemoryFavoriteRepository.kt
  - app/src/test/java/com/arnavigation/domain/usecase/SearchDestinationUseCaseTest.kt
  - app/src/test/java/com/arnavigation/data/repository/InMemoryFavoriteRepositoryTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-006
  title: 목적지 설정 — 딥링크(링크 수신) 파싱 모듈
  description: 자녀가 카카오톡 등으로 보낸 목적지 링크를 수신하여 앱이 자동으로 목적지를 설정할 수 있도록 딥링크 URL을 파싱하는 DeepLinkParser를
    구현한다.
  acceptance_criteria:
  - 'DeepLinkParser.parse(url: String): DeepLinkDestination? 가 arnavigation://navigate?placeName=불국사&lat=35.7904&lng=129.3314
    형식의 URL을 파싱하여 DeepLinkDestination(placeName, coordinate)를 반환한다'
  - lat 또는 lng 파라미터가 누락된 URL에 대해 parse()가 null을 반환함을 테스트에서 검증한다
  - lat/lng가 유효한 숫자 범위(위도 -90~90, 경도 -180~180)를 벗어난 경우 null을 반환함을 테스트에서 검증한다
  - 'DeepLinkDestination(placeName: String, coordinate: Coordinate) 데이터 클래스가 정의되어
    있고, parse() 결과를 SearchDestinationUseCase 없이 바로 NavigationManager에 목적지로 전달할 수 있는
    구조임을 확인하는 통합 테스트가 통과한다'
  - '잘못된 scheme(예: https://)을 가진 URL에 대해 parse()가 null을 반환함을 테스트에서 검증한다'
  target_files:
  - app/src/main/java/com/arnavigation/domain/deeplink/DeepLinkDestination.kt
  - app/src/main/java/com/arnavigation/domain/deeplink/DeepLinkParser.kt
  - app/src/test/java/com/arnavigation/domain/deeplink/DeepLinkParserTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-007
  title: AR 방향 계산 모듈
  description: 현재 위치(Coordinate), 기기 방위각(bearing), 다음 경로 지점(RouteStep의 Coordinate)을
    입력받아 AR 화면에 화살표를 렌더링하기 위한 상대 각도를 계산하는 ArDirectionCalculator를 구현한다.
  acceptance_criteria:
  - 'ArDirectionCalculator.calculate(currentPosition: Coordinate, deviceBearing: Double,
    targetCoordinate: Coordinate): Double 이 현재 위치에서 목표 지점까지의 방위각과 기기 방위각의 차이(상대 각도,
    -180~180도)를 반환한다'
  - 단위 테스트에서 정북(0도) 방향을 바라보는 기기가 정북 방향 목표를 향할 때 상대 각도 0.0을 반환함을 검증한다
  - 단위 테스트에서 정북(0도) 방향을 바라보는 기기가 정동(90도) 방향 목표를 향할 때 상대 각도 90.0을 반환함을 검증한다
  - 상대 각도가 항상 -180.0 이상 180.0 이하 범위에 속함을 경계값(0, 180, -180, 360, -360)에 대한 파라미터화 테스트에서
    검증한다
  - 두 Coordinate가 동일한 위치일 때(거리=0) calculate()가 예외 없이 0.0을 반환함을 테스트에서 검증한다
  target_files:
  - app/src/main/java/com/arnavigation/domain/ar/ArDirectionCalculator.kt
  - app/src/test/java/com/arnavigation/domain/ar/ArDirectionCalculatorTest.kt
  test_framework: pytest
  depends_on:
  - task-001
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-008
  title: ARCore 세션 관리 및 AR 화살표 렌더링 래퍼
  description: ARCore 세션의 생명주기(초기화, 일시정지, 재개, 종료)를 관리하고, ArDirectionCalculator에서 받은
    상대 각도를 기반으로 카메라 화면에 화살표 오버레이를 렌더링하는 ArSessionManager와 ArArrowRenderer를 구현한다.
  acceptance_criteria:
  - ArSessionManager가 ARCore 지원 여부를 ArCoreApk.checkAvailability()로 확인하고, 미지원 기기에서는
    ArNotSupportedException을 throw하며 이를 호출부에서 처리할 수 있음을 확인하는 단위 테스트(ARCore 의존성 모킹)가
    통과한다
  - ArSessionManager.start(), pause(), stop() 메서드가 각각 ARCore Session의 resume(), pause(),
    close()를 호출하도록 구현되어 있으며, 상태 전환 순서(start→pause→start→stop)에서 예외가 발생하지 않음을 테스트에서
    검증한다
  - 'ArArrowRenderer.updateDirection(relativeAngle: Double)를 호출하면 내부적으로 relativeAngle
    값이 저장되고, getCurrentAngle()로 조회 시 동일한 값이 반환됨을 테스트에서 검증한다'
  - relativeAngle이 -180~180 범위를 벗어난 값으로 updateDirection() 호출 시 IllegalArgumentException을
    throw함을 테스트에서 검증한다
  - ArSessionManager가 NavigationState.USER_AR_MODE 또는 DEVIATION_AR_MODE일 때만 활성화되고,
    NORMAL_GUIDANCE 상태에서는 세션이 일시정지 상태임을 상태 연동 테스트에서 검증한다
  target_files:
  - app/src/main/java/com/arnavigation/ar/ArSessionManager.kt
  - app/src/main/java/com/arnavigation/ar/ArArrowRenderer.kt
  - app/src/main/java/com/arnavigation/ar/ArNotSupportedException.kt
  - app/src/test/java/com/arnavigation/ar/ArSessionManagerTest.kt
  - app/src/test/java/com/arnavigation/ar/ArArrowRendererTest.kt
  test_framework: pytest
  depends_on:
  - task-007
  - task-004
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-009
  title: GPS 위치 추적 및 위치 업데이트 서비스
  description: Android LocationManager 또는 FusedLocationProviderClient를 사용하여 주기적으로
    GPS 위치를 수신하고, NavigationManager에 위치 업데이트를 전달하는 LocationTrackingService를 구현한다.
  acceptance_criteria:
  - 'LocationTrackingService가 LocationListener 인터페이스(onLocationUpdate(coordinate:
    Coordinate))를 등록하고 해제하는 addListener/removeListener 메서드를 제공하며, 위치 수신 시 등록된 모든 리스너에게
    정확히 한 번 알림이 전달됨을 테스트에서 검증한다'
  - FusedLocationProviderClient를 모킹한 단위 테스트에서 위치 업데이트 수신 시 Coordinate 객체로 올바르게 변환(lat,
    lng 매핑)됨을 검증한다
  - LocationTrackingService.start()와 stop()이 각각 위치 요청 등록과 해제를 수행하며, stop() 이후에는 리스너에게
    업데이트가 전달되지 않음을 테스트에서 검증한다
  - 위치 정확도(accuracy)가 50m 초과인 업데이트는 필터링하여 리스너에게 전달하지 않음을 테스트에서 검증한다
  - LocationTrackingService가 NavigationManager.updatePosition()을 위치 수신마다 호출하도록 연결한
    통합 테스트에서, 이탈 좌표 수신 시 NavigationState가 DEVIATION_AR_MODE로 전환됨을 검증한다
  target_files:
  - app/src/main/java/com/arnavigation/location/LocationListener.kt
  - app/src/main/java/com/arnavigation/location/LocationTrackingService.kt
  - app/src/test/java/com/arnavigation/location/LocationTrackingServiceTest.kt
  test_framework: pytest
  depends_on:
  - task-004
  status: pending
  retry_count: 0
  last_error: ''
  pr_url: ''
  failure_reason: ''
- id: task-010
  title: 음성 안내(TTS) 서비스
  description: Android TextToSpeech를 사용하여 경로 안내 텍스트를 음성으로 출력하는 VoiceGuideService를
    구현한다. 일반 안내 모드와 이탈 알림 시 음성 메시지를 생성하는 메시지 포맷터도 포함한다.
  acceptance_criteria:
  - 'VoiceGuideService.speak(message: String)가 TextToSpeech 엔진을 통해 메시지를 발화하며, 이미 발화
    중인 경우 현재 발화를 중단하고 새 메시지를 발화함을 TextToSpeech 모킹 테스트에서 검증한다'
