- acceptance_criteria:
  - TaskReport 인스턴스를 save_report()로 저장하면 지정 디렉토리에 YAML 파일이 생성된다
  - load_reports()가 저장된 YAML 파일들을 TaskReport 리스트로 정확히 복원한다
  - aggregate([])는 total=0, success_rate=0, first_try_rate=0을 반환한다
  - aggregate()는 status=="COMPLETED"인 항목만 completed로 집계한다
  - aggregate()의 success_rate는 completed/total*100 (정수 반올림)이다
  - since 파라미터로 completed_at 기준 필터링이 동작한다
  - reviewer_verdict=="APPROVED"인 항목 수를 reviewer_approved로 반환한다
  depends_on: []
  description: "metrics/collector.py 모듈을 구현한다.\n\nTask Report를 YAML 파일로 저장/로드하고, 여러\
    \ Report를 집계하는\n순수 Python 모듈이다. 외부 라이브러리 없이 표준 라이브러리(dataclasses, pathlib,\ndatetime,\
    \ yaml)만 사용한다.\n\n구현할 요소:\n- TaskReport dataclass: task_id(str), title(str), status(str),\n\
    \  completed_at(str), retry_count(int), test_count(int),\n  test_pass_first_try(bool),\
    \ reviewer_verdict(str),\n  time_elapsed_seconds(float), failure_reasons(list[str]),\n\
    \  reviewer_feedback(str) 필드를 가진다.\n- save_report(report: TaskReport, reports_dir:\
    \ str = \"data/reports\") -> Path:\n  task-{task_id}.yaml 파일명으로 저장하고 경로를 반환한다.\n\
    - load_reports(reports_dir: str = \"data/reports\", since: datetime | None = None)\
    \ -> list[TaskReport]:\n  디렉토리 내 모든 YAML을 로드한다. since가 주어지면 completed_at이\n  그\
    \ 이후인 것만 반환한다.\n- aggregate(reports: list[TaskReport]) -> dict:\n  total, completed,\
    \ failed, success_rate(%), first_try_rate(%),\n  avg_elapsed_seconds, total_retries,\
    \ reviewer_approved 키를 반환한다.\n"
  failure_reason: '테스트가 3회 모두 실패했습니다.

