    \ Path) -> dict:\n  파이썬 파일을 ast로 파싱하여 {\"path\": str, \"classes\": list, \"functions\"\
    : list}\n  구조를 반환한다. 각 class는 {\"name\": str, \"methods\": list[str], \"docstring\"\
    : str | None},\n  각 function은 {\"name\": str, \"signature\": str, \"docstring\"\
    : str | None}를 포함한다.\n  최상위 함수와 클래스만 추출한다.\n- scan_directory(root: Path, exclude_dirs:\
    \ list[str] | None = None) -> list[dict]:\n  디렉토리를 재귀 탐색하여 .py 파일들의 parse_module\
    \ 결과 리스트를 반환한다.\n  exclude_dirs 기본값은 [\"__pycache__\", \".git\", \"venv\", \"\
    .venv\", \"node_modules\"]이다.\n- generate_markdown(modules: list[dict], title:\
    \ str = \"PROJECT_STRUCTURE\") -> str:\n  모듈 목록을 마크다운 문자열로 변환한다.\n  형식: 파일 경로를\
