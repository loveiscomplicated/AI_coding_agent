- id: task-001
  title: 정수 계산기 구현
  description: '두 정수를 받아 사칙연산(덧셈, 뺄셈, 곱셈, 나눗셈)을 수행하는

    Calculator 클래스를 구현한다.

    나눗셈 시 0으로 나누는 경우 ValueError 를 발생시킨다.

    '
  acceptance_criteria:
  - Calculator().add(2, 3) 은 5 를 반환한다
  - Calculator().subtract(10, 4) 는 6 을 반환한다
  - Calculator().multiply(3, 4) 는 12 를 반환한다
  - Calculator().divide(10, 2) 는 5.0 을 반환한다
  - Calculator().divide(1, 0) 은 ValueError 를 발생시킨다
  target_files: []
  test_framework: pytest
  status: done
  retry_count: 0
