  description: "reports/weekly.py 모듈을 구현한다.\n\nTaskReport 리스트를 받아 ISO 주차 기준 주간 마크다운\
    \ 보고서를 생성하는\n순수 함수 모듈이다. LLM을 호출하지 않고 데이터만으로 보고서를 구성한다.\n\n구현할 요소:\n- get_week_range(year:\
    \ int, week: int) -> tuple[datetime, datetime]:\n  ISO 주차의 월요일 00:00 UTC ~ 일요일\
    \ 23:59:59 UTC를 반환한다.\n- filter_by_week(reports: list[TaskReport], year: int,\
    \ week: int) -> list[TaskReport]:\n  completed_at 기준으로 해당 주의 Report만 필터링한다.\n\
    - collect_stats(reports: list[TaskReport]) -> dict:\n  total, completed, failed,\
    \ success_rate, first_try_rate, avg_elapsed_seconds,\n  total_retries 키를 포함한 집계\
    \ 딕셔너리를 반환한다.\n- generate_report(reports: list[TaskReport], year: int, week: int)\
    \ -> str:\n  마크다운 문자열을 반환한다. 제목 형식은 \"# 주간 보고서: {year}년 {week}주차\"이며\n  집계 지표와\
    \ 태스크 목록을 포함한다.\n\n주의: TaskReport는 metrics.collector에서 임포트한다.\n"
