  - collect_stats([])는 total=0, success_rate=0을 반환한다
  - collect_stats는 COMPLETED 상태 항목을 정확히 집계한다
  - generate_report()의 반환값은 "# 주간 보고서" 문자열로 시작한다
  - generate_report()의 반환값에 year와 week 숫자가 포함된다
